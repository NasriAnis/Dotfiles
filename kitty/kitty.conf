# --- Performance & System ---
# Forces X11 to bypass Wayland's slow window-negotiation handshake
#linux_display_server x11
repaint_delay    8
input_delay      2
sync_to_monitor  no

allow_remote_control yes

remember_window_size no
initial_window_height 550
initial_window_width 850

scrollback_lines	10000

# --- Font & Bold Pop ---
font_family      JetBrains Mono Bold
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Boosts thickness for that 'bold' aesthetic
text_composition_strategy 1.7 0

# --- Window & Decorations ---
hide_window_decorations yes

confirm_os_window_close -1

enable_audio_bell no

# --- Cursor ---
cursor           #ffffff
cursor_text_color #000000
cursor_shape      beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5

# --- Vivid Color Scheme ---
background #0f0f0f
foreground #ffffff
selection_background #44475a
background_opacity 1

# Black
color0  #1e1e1e
color8  #5c5c5c

# Red (Vivid Crimson)
color1  #ff5555
color9  #ff6e6e

# Green (Neon Green)
color2  #50fa7b
color10 #69ff94

# Yellow (Bright Gold)
color3  #f1fa8c
color11 #ffffa5

# Blue (Deep Electric Blue)
color4  #3d5aff
color12 #82aaff

# Purple (Vibrant Magenta)
color5  #bd93f9
color13 #ff79c6

# Cyan (Bright Teal)
color6  #00ffd5
color14 #a4ffff

# White
color7  #f8f8f2
color15 #ffffff

# --- Layouts ---
# This allows you to stack windows or split them side-by-side
enabled_layouts splits,stack

# --- Tilix-style Splitting ---
# Split the window vertically (Right/Left)
map ctrl+alt+r launch --location=vsplit

# Split the window horizontally (Up/Down)
map ctrl+alt+d launch --location=hsplit

# --- Moving between Panes ---
# Use Alt + Arrow keys to jump between your splits
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# --- Resizing Panes ---
# Use Ctrl+Shift+Arrows to resize the active split
map ctrl+shift+left  resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up    resize_window taller
map ctrl+shift+down  resize_window shorter

# --- Window Delimiters & Borders ---
window_border_width 1pt
active_border_color #50fa7b
inactive_border_color #282a36
window_margin_width 0 
draw_minimal_borders no

# Keep your padding inside each split
window_padding_width 4

# --- Tab Navigation ---
# Cycle forward (Right)
map ctrl+tab        next_tab
# Cycle backward (Left)
map ctrl+shift+tab  previous_tab
map ctrl+shift+w close_tab
map ctrl+alt+w close_window

# --- Slanted Powerline Tab Bar ---
# These settings give you the "pill" shaped tabs from the video
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_align           left

# Colors & Style
tab_bar_background      #0f0f0f
active_tab_foreground   #50fa7b
active_tab_background   #383838
active_tab_font_style   bold
inactive_tab_foreground #f8f8f2
inactive_tab_background #242323

shell_integration enabled


# Title Templates
tab_title_template         "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.active_wd.rsplit('/', 1)[-1]}"
active_tab_title_template  "{fmt.fg._fff}{tab.active_wd.rsplit('/', 1)[-1]} 󰄬"

# Margins to make the tabs look like "floating pills"
tab_bar_margin_width      5.0
tab_bar_margin_height     5.0 0.0
tab_bar_min_tabs          1

# Ubuntu Window Bar Color Match
wayland_titlebar_color #1e1e1e
macos_titlebar_color   #1e1e1e

# --- High-Speed Scrolling ---
# Increase the scroll wheel speed (2.0 or 3.0 is usually the sweet spot)
touch_scroll_multiplier 3.0
wheel_scroll_multiplier 3.0

# How many lines to keep in memory (more lines = more you can scroll back)
scrollback_lines 5000

# This makes the terminal feel "snappier" when scrolling through lots of text
# It reduces the delay between the scroll command and the pixels moving
repaint_delay    5
input_delay      1

cursor_trail 3

map alt+h send_key left
map alt+j send_key down
map alt+k send_key up
map alt+l send_key right


